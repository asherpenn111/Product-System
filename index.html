<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>屋掌柜HOME MASTER｜风格选择</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

  body {
    margin: 0;
    font-family: "PingFang SC", "Microsoft YaHei UI", "Noto Serif SC", sans-serif;
    background: #50200A;
    color: #fff;
    min-height: 100vh;
  }

  /* ===== 标题 ===== */
  header {
    text-align: center;
    font-size: clamp(20px, 3.5vw, 38px);
    padding: 36px 20px 24px;
    letter-spacing: 3px;
    font-weight: 700;
    color: #f5d98e;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  /* ===== 客户信息卡片 ===== */
  .customer-card {
    margin: 0 auto 20px;
    max-width: 780px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 20px;
    padding: 16px 20px;
    backdrop-filter: blur(4px);
  }
  .customer-card h3 {
    font-size: 18px;
    margin-bottom: 12px;
    color: #f5d98e;
    border-left: 3px solid #c9a84c;
    padding-left: 12px;
  }
  .customer-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 8px;
  }
  .customer-field {
    flex: 1;
    min-width: 160px;
  }
  .customer-field label {
    display: block;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 4px;
  }
  .customer-field input, .customer-field textarea {
    width: 100%;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 14px;
    color: #fff;
    outline: none;
    transition: 0.2s;
    box-sizing: border-box;
  }
  .customer-field input:focus, .customer-field textarea:focus {
    border-color: #c9a84c;
    box-shadow: 0 0 0 2px rgba(201,168,76,0.3);
  }
  .customer-field textarea {
    resize: vertical;
    min-height: 60px;
  }

  /* ===== 大框容器 ===== */
  .frame {
    margin: 0 auto 40px;
    max-width: 780px;
    padding: 24px;
    border: 2px solid #c9a84c;
    border-radius: 20px;
    box-shadow:
      0 0 0 1px rgba(201,168,76,0.25),
      0 0 30px rgba(201,168,76,0.15),
      inset 0 0 30px rgba(0,0,0,0.2);
    background: rgba(0,0,0,0.15);
    outline: 1px solid rgba(201,168,76,0.4);
    outline-offset: -8px;
  }

  /* ===== 网格：2列4排 ===== */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  /* ===== 卡片 ===== */
  .card {
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow:
      0 8px 24px rgba(0,0,0,0.55),
      0 2px 6px rgba(0,0,0,0.4),
      0 0 0 1px rgba(201,168,76,0.15);
  }

  .card:hover {
    transform: scale(1.03) translateY(-3px);
    box-shadow:
      0 16px 40px rgba(0,0,0,0.65),
      0 4px 12px rgba(0,0,0,0.5),
      0 0 0 1.5px rgba(201,168,76,0.5);
  }

  .card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }

  .card::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 55%;
    background: linear-gradient(transparent, rgba(0,0,0,0.72));
    pointer-events: none;
  }

  .label {
    position: absolute;
    bottom: 14px;
    left: 14px;
    font-size: 17px;
    font-weight: bold;
    letter-spacing: 1.5px;
    color: #fff;
    text-shadow: 0 1px 6px rgba(0,0,0,0.7);
    z-index: 1;
  }

  .label::before {
    content: "";
    display: inline-block;
    width: 4px;
    height: 16px;
    background: #c9a84c;
    border-radius: 2px;
    margin-right: 8px;
    vertical-align: middle;
  }

  @media (max-width: 480px) {
    .grid {
      grid-template-columns: 1fr;
    }
    .frame {
      margin: 0 16px 32px;
      padding: 16px;
    }
    .customer-card {
      margin: 0 16px 20px;
    }
  }
</style>
</head>

<body>

<header>屋掌柜 HOME MASTER｜8大空间风格选择</header>

<!-- 客户信息卡片（新增） -->
<div class="customer-card">
  <h3>📋 客户信息</h3>
  <div class="customer-row">
    <div class="customer-field">
      <label>客户姓名</label>
      <input type="text" id="custName" placeholder="请输入客户姓名">
    </div>
    <div class="customer-field">
      <label>手机号码</label>
      <input type="tel" id="custPhone" placeholder="请输入手机号码">
    </div>
  </div>
  <div class="customer-row">
    <div class="customer-field">
      <label>房屋地址</label>
      <textarea id="custAddr" rows="2" placeholder="请输入房屋地址"></textarea>
    </div>
  </div>
</div>

<div class="frame">
  <div class="grid">

    <!-- 传统欧式 -->
    <div class="card" onclick="openVR('europe')">
      <img src="https://https://asherpenn111.github.io/Product-System/traditional_european.jpg" alt="传统欧式">
      <div class="label">传统欧式</div>
    </div>

    <!-- 奶油风 -->
    <div class="card" onclick="openVR('milk')">
      <img src="https://asherpenn111.github.io/Product-System/cream_style.jpg" alt="奶油风">
      <div class="label">奶油风</div>
    </div>

    <div class="card" onclick="openVR('luxury')">
      <img src="https://picsum.photos/400/300?3" alt="轻奢风">
      <div class="label">轻奢风</div>
    </div>

    <div class="card" onclick="openVR('japanese')">
      <img src="https://picsum.photos/400/300?4" alt="日式原木">
      <div class="label">日式原木</div>
    </div>

    <div class="card" onclick="openVR('minimal')">
      <img src="https://picsum.photos/400/300?5" alt="极简黑白">
      <div class="label">极简黑白</div>
    </div>

    <div class="card" onclick="openVR('wabi')">
      <img src="https://picsum.photos/400/300?6" alt="侘寂风">
      <div class="label">侘寂风</div>
    </div>

    <div class="card" onclick="openVR('smart')">
      <img src="https://picsum.photos/400/300?7" alt="智能家居">
      <div class="label">智能家居</div>
    </div>

    <div class="card" onclick="openVR('eco')">
      <img src="https://picsum.photos/400/300?8" alt="环保健康">
      <div class="label">环保健康</div>
    </div>

  </div>
</div>

<script>
const vrMap = {
  europe:   "https://vr.justeasy.cn/view/g1777639f3409378-1777347551.html",
  milk:     "https://vr.justeasy.cn/view/617mg77d35f5k774-1777355846.html",
  luxury:   "https://vr.justeasy.cn/view/u1x7c77a72h62592-1777262592.html",
  japanese: "https://vr.justeasy.cn/view/u1x7c77a72h62592-1777262592.html",
  minimal:  "https://vr.justeasy.cn/view/u1x7c77a72h62592-1777262592.html",
  wabi:     "https://vr.justeasy.cn/view/u1x7c77a72h62592-1777262592.html",
  smart:    "https://vr.justeasy.cn/view/u1x7c77a72h62592-1777262592.html",
  eco:      "https://vr.justeasy.cn/view/u1x7c77a72h62592-1777262592.html"
};

function openVR(style) {
  const url = vrMap[style];
  if (url) {
    window.open(url, "_blank");
  } else {
    alert("该风格暂未配置");
  }
}
</script>

<!-- ========== 客户登记/更新模块 (浮动按钮 + 弹窗) ========== -->
<style>
  #openFormBtnFix {
    all: initial !important;
    position: fixed !important;
    bottom: 20px !important;
    right: 20px !important;
    z-index: 9999 !important;
    background-color: #007bff !important;
    color: white !important;
    border: none !important;
    border-radius: 50px !important;
    padding: 12px 20px !important;
    cursor: pointer !important;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3) !important;
    font-weight: bold !important;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif !important;
    font-size: 16px !important;
    line-height: 1 !important;
    width: auto !important;
    height: auto !important;
    letter-spacing: normal !important;
    text-transform: none !important;
  }
</style>

<button id="openFormBtnFix">📋 登记/更新客户</button>

<div id="recordModalFix" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; justify-content: center; align-items: center;">
  <div style="background: white; width: 90%; max-width: 500px; max-height: 80%; overflow-y: auto; border-radius: 10px; padding: 20px; color: #333;">
    <h3>客户信息登记/更新</h3>
    <form id="recordFormFix">
      <label>员工姓名：</label><input type="text" id="employee_name_fix" required><br><br>
      <label>客户姓名：</label><input type="text" id="customer_name_fix" required><br><br>
      <label>📱 客户手机号（唯一标识）：</label><input type="tel" id="customer_phone_fix" required><br><br>
      <label>房屋地址：</label><textarea id="address_fix" rows="2" required></textarea><br><br>
      
      <label>使用的系统：</label>
      <select id="system_used_fix">
        <option value="房屋健康系统">房屋健康系统</option>
        <option value="定价系统">定价系统</option>
        <option value="产品系统" selected>产品系统</option>
        <option value="Home-Master">Home-Master</option>
      </select><br><br>
      
      <div id="dynamicFieldsFix"></div>
      
      <label>客户意向等级：</label>
      <select id="intent_level_fix">
        <option value="">-- 不更新 --</option>
        <option value="高">高</option>
        <option value="中">中</option>
        <option value="低">低</option>
        <option value="已签约">已签约</option>
      </select><br><br>
      
      <label>跟进备注：</label><textarea id="remark_fix" rows="2"></textarea><br><br>
      
      <label>跟进状态：</label>
      <select id="followup_status_fix">
        <option value="">-- 不更新 --</option>
        <option value="待跟进">待跟进</option>
        <option value="已报价">已报价</option>
        <option value="已签约">已签约</option>
        <option value="已放弃">已放弃</option>
      </select><br><br>
      
      <button type="submit">提交</button>
      <button type="button" id="closeModalBtnFix">取消</button>
    </form>
  </div>
</div>

<script>
(function() {
  const modal = document.getElementById('recordModalFix');
  const openBtn = document.getElementById('openFormBtnFix');
  const closeBtn = document.getElementById('closeModalBtnFix');
  const form = document.getElementById('recordFormFix');
  const systemSelect = document.getElementById('system_used_fix');
  const dynamicFieldsDiv = document.getElementById('dynamicFieldsFix');

  if (!openBtn || !modal) return;

  // 自动填充函数：从客户信息卡片获取数据
  function autoFillForm() {
    const custName = document.getElementById('custName')?.value || '';
    const custPhone = document.getElementById('custPhone')?.value || '';
    const custAddr = document.getElementById('custAddr')?.value || '';
    
    document.getElementById('customer_name_fix').value = custName;
    document.getElementById('customer_phone_fix').value = custPhone;
    document.getElementById('address_fix').value = custAddr;
    
    // 产品系统可以在这里添加自动获取当前选中的产品或风格信息（可选）
    // 如果需要，可以获取当前页面的风格选择，但产品系统没有选择器，所以留空或者可以放一个“产品清单”字段
    // 这里暂不自动填充产品清单，由员工手动填写
  }
  
  openBtn.onclick = () => {
    autoFillForm();   // 打开弹窗前自动填充客户信息
    modal.style.display = 'flex';
  };
  closeBtn.onclick = () => { modal.style.display = 'none'; };
  window.onclick = (event) => { if (event.target === modal) modal.style.display = 'none'; };

  function updateDynamicFields() {
    const system = systemSelect.value;
    let html = '';
    if (system === '房屋健康系统') {
      html = `
        <label>房屋健康评分/等级：</label><input type="text" id="house_health_score_fix"><br><br>
        <label>健康检测关键指标：</label><textarea id="health_indicators_fix" rows="2"></textarea><br><br>
      `;
    } else if (system === '定价系统') {
      html = `
        <label>报价方案编号/名称：</label><input type="text" id="quotation_name_fix"><br><br>
        <label>报价总金额（元）：</label><input type="number" id="quotation_amount_fix"><br><br>
      `;
    } else if (system === '产品系统') {
      html = `
        <label>所选产品清单：</label><textarea id="product_list_fix" rows="2" placeholder="例如：传统欧式沙发、奶油风茶几..."></textarea><br><br>
        <label>产品总金额（元）：</label><input type="number" id="product_amount_fix" placeholder="0"><br><br>
      `;
    } else if (system === 'Home-Master') {
      html = `
        <label>Home-Master 汇总结论：</label><textarea id="home_master_summary_fix" rows="2"></textarea><br><br>
      `;
    }
    dynamicFieldsDiv.innerHTML = html;
  }
  systemSelect.addEventListener('change', updateDynamicFields);
  updateDynamicFields();

  form.onsubmit = async (e) => {
    e.preventDefault();
    
    const getVal = (id) => document.getElementById(id)?.value || '';
    const payload = {
      employee_name: getVal('employee_name_fix'),
      customer_name: getVal('customer_name_fix'),
      customer_phone: getVal('customer_phone_fix'),
      address: getVal('address_fix'),
      system_used: systemSelect.value,
      house_health_score: getVal('house_health_score_fix'),
      health_indicators: getVal('health_indicators_fix'),
      quotation_name: getVal('quotation_name_fix'),
      quotation_amount: getVal('quotation_amount_fix'),
      product_list: getVal('product_list_fix'),
      product_amount: getVal('product_amount_fix'),
      home_master_summary: getVal('home_master_summary_fix'),
      intent_level: getVal('intent_level_fix'),
      remark: getVal('remark_fix'),
      followup_status: getVal('followup_status_fix')
    };
    
    if (!payload.customer_phone) {
      alert('请填写客户手机号');
      return;
    }
    
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbwyRgdHugsLqcBDNXjaQvQKAdDq2wugPTUuTav1_75Crb2jJK-NGg6aHcOTGFUKFRwo/exec';
    
    try {
      const response = await fetch(webAppUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(payload)
      });
      const result = await response.json();
      if (result.result === 'new') {
        alert('新客户登记成功！');
      } else if (result.result === 'updated') {
        alert('客户信息已更新！');
      } else {
        alert('操作失败：' + JSON.stringify(result));
      }
      modal.style.display = 'none';
      form.reset();
    } catch (err) {
      alert('网络错误：' + err.message);
    }
  };
})();
</script>
<!-- ========== 登记模块结束 ========== -->

</body>
</html>
