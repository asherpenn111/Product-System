<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>屋掌柜HOME MASTER｜风格选择</title>

<style>
body{
  margin:0;
  font-family:"PingFang SC","Microsoft YaHei UI",sans-serif;
  background:#50200A;
  color:#fff;
}

/* ===== LOGO ===== */
.logo{
  position:fixed;
  top:15px;
  right:15px;
  width:80px;
}
.logo img{
  width:100%;
}

/* ===== 标题 ===== */
header{
  text-align:center;
  font-size:clamp(22px,4vw,42px);
  padding:30px 20px 10px;
  letter-spacing:2px;
}

/* ===== 网格 ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:16px;
  padding:20px;
}

/* ===== 卡片 ===== */
.card{
  height:180px;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.04);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* 图片 */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 遮罩 */
.card::after{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:50%;
  background:linear-gradient(transparent, rgba(0,0,0,0.7));
}

/* 文案 */
.label{
  position:absolute;
  bottom:12px;
  left:12px;
  font-size:16px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
  <img src="https://asherpenn111.github.io/logo.png">
</div>

<header>屋掌柜HOME MASTER｜8大空间风格选择</header>

<div class="grid">

  <div class="card" onclick="openVR('europe')">
    <img src="https://picsum.photos/400/300?1">
    <div class="label">传统欧式</div>
  </div>

  <div class="card" onclick="openVR('milk')">
    <img src="https://picsum.photos/400/300?2">
    <div class="label">奶油风</div>
  </div>

  <div class="card" onclick="openVR('luxury')">
    <img src="https://picsum.photos/400/300?3">
    <div class="label">轻奢风</div>
  </div>

  <div class="card" onclick="openVR('japanese')">
    <img src="https://picsum.photos/400/300?4">
    <div class="label">日式原木</div>
  </div>

  <div class="card" onclick="openVR('minimal')">
    <img src="https://picsum.photos/400/300?5">
    <div class="label">极简黑白</div>
  </div>

  <div class="card" onclick="openVR('wabi')">
    <img src="https://picsum.photos/400/300?6">
    <div class="label">侘寂风</div>
  </div>

  <div class="card" onclick="openVR('smart')">
    <img src="https://picsum.photos/400/300?7">
    <div class="label">智能家居</div>
  </div>

  <div class="card" onclick="openVR('eco')">
    <img src="https://picsum.photos/400/300?8">
    <div class="label">环保健康</div>
  </div>

</div>

<script>

/* VR映射（已修正） */
const vrMap = {
  europe: "https://vr.justeasy.cn/view/g1777639f3409378-1777347551.html",
  milk: "https://vr.justeasy.cn/view/617mg77d35f5k774-1777355846.html",
  luxury: "https://vr.justeasy.cn/view/u1x7c77a72h62592-1777262592.html",
  japanese: "https://vr.justeasy.cn/view/u1x7c77a72h62592-1777262592.html",
  minimal: "https://vr.justeasy.cn/view/u1x7c77a72h62592-1777262592.html",
  wabi: "https://vr.justeasy.cn/view/u1x7c77a72h62592-1777262592.html",
  smart: "https://vr.justeasy.cn/view/u1x7c77a72h62592-1777262592.html",
  eco: "https://vr.justeasy.cn/view/u1x7c77a72h62592-1777262592.html"
};

/* 打开VR */
function openVR(style){
  const url = vrMap[style];
  if(url){
    window.open(url, "_blank");
  }else{
    alert("该风格暂未配置");
  }
}

</script>

</body>
</html>
